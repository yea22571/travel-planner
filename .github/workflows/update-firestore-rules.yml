name: 自動更新 Firestore 規則

on:
  schedule:
    # 每 25 天執行一次（確保不超過 30 天免費期）
    # 格式：分 時 日 月 週
    - cron: '0 2 */25 * *'
  workflow_dispatch:  # 允許手動觸發

jobs:
  update-firestore-rules:
    runs-on: ubuntu-latest
    steps:
      - name: 取得程式碼
        uses: actions/checkout@v4

      - name: 安裝 Firebase CLI
        run: npm install -g firebase-tools

      - name: 部署 Firestore 規則
        run: firebase deploy --only firestore:rules --project travel-planner-n-cost
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}

      - name: 顯示結果
        run: echo "✅ Firestore 規則已成功更新！allow read, write: if true"
