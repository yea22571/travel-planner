name: auto-update-firestore-rules

on:
  schedule:
    - cron: '0 2 */25 * *'
  workflow_dispatch:

jobs:
  update-firestore-rules:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Deploy Firestore Rules
        run: firebase deploy --only firestore:rules --project travel-planner-n-cost
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}

      - name: Done
        run: echo "Firestore rules updated successfully"
